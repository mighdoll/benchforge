<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Browser Heap Profiling Example</title>
  </head>
  <body>
    <h1>Browser Heap Profiling Example</h1>
    <pre id="log"></pre>
    <script>
    function allocArrays() {
      const results = [];
      for (let i = 0; i < 10000; i++) results.push(new Array(100).fill(i));
      return results;
    }

    function allocTypedArrays() {
      const buffers = [];
      for (let i = 0; i < 5000; i++) buffers.push(new Float64Array(64));
      return buffers;
    }

    function allocStrings() {
      const strings = [];
      for (let i = 0; i < 20000; i++) strings.push("x".repeat(200) + i);
      return strings;
    }

    function allocObjects() {
      const objs = [];
      for (let i = 0; i < 10000; i++)
        objs.push({ a: i, b: [i, i + 1], c: { d: i } });
      return objs;
    }

    window.__bench = () => {
      allocArrays();
      allocTypedArrays();
      allocStrings();
      allocObjects();
    };
    </script>
  </body>
</html>
